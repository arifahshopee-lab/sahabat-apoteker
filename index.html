<!DOCTYPE html>
<html>
<head>
    <title>Sahabat Apoteker</title>
    <style>
        body {
            font-family: Arial;
            background-color: #e6f2ff;
            text-align: center;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, button {
            margin: 5px;
            padding: 8px;
            width: 90%;
        }
    </style>
</head>
<body>

<h2>Sahabat Apoteker</h2>

<div class="box">
    <h3>Login</h3>
    <input type="text" placeholder="Email"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<div class="box" id="menu" style="display:none;">
    <h3>Menu Konsultasi</h3>
    <button>Konsultasi Chat</button><br>
    <button>Upload Resep</button><br>
    <button>Riwayat Konsultasi</button><br>
    <button>Informasi Obat</button>
</div>

<script>
function login() {
    document.getElementById("menu").style.display = "block";
}
</script>

</body>
</html>
